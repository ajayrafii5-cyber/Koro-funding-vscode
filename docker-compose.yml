# ═══════════════════════════════════════════════════════════
# Koro Funding — Docker Compose Stack
# Full production stack: API + Risk Engine + DB + Cache + Nginx
#
# Usage:
#   docker-compose up -d           # Start all services
#   docker-compose logs -f api     # Follow API logs
#   docker-compose restart api     # Restart single service
# ═══════════════════════════════════════════════════════════

version: '3.9'

services:

  # ─── MAIN API ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: koro_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - koro_internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ─── RISK ENGINE ─────────────────────────────────────────
  risk-engine:
    build:
      context: .
      dockerfile: Dockerfile.risk
    container_name: koro_risk_engine
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - koro_internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ─── POSTGRES DATABASE ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: koro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: korofunding
      POSTGRES_USER: koro_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - koro_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koro_user -d korofunding"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ─── REDIS CACHE ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: koro_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - koro_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NGINX REVERSE PROXY ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: koro_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - koro_internal
      - koro_external

  # ─── CERTBOT (SSL) ────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: koro_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Run manually: docker-compose run certbot certonly ...
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ─── PGADMIN (Dev/Staging only — remove in production) ───
  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: koro_pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@korofunding.com
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
  #   ports:
  #     - "5050:80"
  #   networks:
  #     - koro_internal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_www:
    driver: local
  certbot_conf:
    driver: local

networks:
  koro_internal:
    driver: bridge
    internal: true     # No direct internet access
  koro_external:
    driver: bridge     # Only nginx has external access
